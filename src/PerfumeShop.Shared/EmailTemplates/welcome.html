<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎加入 {{SITE_NAME}}</title>
    <style>
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 40px 30px; text-align: center; }
        .header h1 { color: #e8d5b7; margin: 0; font-size: 28px; font-weight: 300; letter-spacing: 2px; }
        .content { padding: 40px 30px; }
        .content h2 { color: #1a1a2e; font-size: 22px; margin-bottom: 20px; }
        .content p { color: #555; line-height: 1.8; font-size: 15px; }
        .btn { display: inline-block; background: #1a1a2e; color: #e8d5b7; padding: 14px 36px; text-decoration: none; border-radius: 4px; margin: 20px 0; }
        .footer { background: #f9f9f9; padding: 20px 30px; text-align: center; color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{SITE_NAME}}</h1>
        </div>
        <div class="content">
            <h2>欢迎 {{FULL_NAME}}！</h2>
            <p>感谢您注册 {{SITE_NAME}}。我们致力于为每一位客户提供独特的香氛定制体验。</p>
            <p>您可以立即开始探索我们的精选香氛系列，或通过我们的智能推荐系统找到最适合您的专属香氛。</p>
            <p style="text-align: center;">
                <a href="{{SITE_URL}}" class="btn">开始探索</a>
            </p>
            <p>如有任何问题，请随时联系我们的客服团队。</p>
        </div>
        <div class="footer">
            <p>&copy; {{YEAR}} {{SITE_NAME}}. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
