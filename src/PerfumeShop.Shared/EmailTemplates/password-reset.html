<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码重置 - {{SITE_NAME}}</title>
    <style>
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 40px 30px; text-align: center; }
        .header h1 { color: #e8d5b7; margin: 0; font-size: 24px; font-weight: 300; }
        .content { padding: 40px 30px; }
        .content h2 { color: #1a1a2e; font-size: 20px; }
        .content p { color: #555; line-height: 1.8; font-size: 15px; }
        .btn { display: inline-block; background: #e74c3c; color: #ffffff; padding: 14px 36px; text-decoration: none; border-radius: 4px; margin: 20px 0; }
        .warning { background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px 16px; margin: 20px 0; color: #856404; font-size: 14px; }
        .footer { background: #f9f9f9; padding: 20px 30px; text-align: center; color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>密码重置请求</h1>
        </div>
        <div class="content">
            <h2>亲爱的 {{FULL_NAME}}，</h2>
            <p>我们收到了您的密码重置请求。请点击下方按钮设置新密码：</p>
            <p style="text-align: center;">
                <a href="{{RESET_LINK}}" class="btn">重置密码</a>
            </p>
            <div class="warning">
                <strong>注意：</strong>此链接将在 1 小时内失效。如果您没有请求密码重置，请忽略此邮件。
            </div>
            <p>如果按钮无法点击，请复制以下链接到浏览器地址栏：</p>
            <p style="word-break: break-all; color: #1a1a2e; font-size: 13px;">{{RESET_LINK}}</p>
        </div>
        <div class="footer">
            <p>&copy; {{YEAR}} {{SITE_NAME}}. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
