<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中心 - 香氛定制电商网站</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">
    <!--#include file="includes/nav.asp"-->
    
    <div class="main-content">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="fas fa-box-open"></i>
                </div>
                <div class="stat-number">0</div>
                <p class="stat-label">商品总数</p>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="fas fa-shopping-cart"></i>
                </div>
                <div class="stat-number">0</div>
                <p class="stat-label">订单总数</p>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon orange">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-number">0</div>
                <p class="stat-label">客户总数</p>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon purple">
                    <i class="fas fa-dollar-sign"></i>
                </div>
                <div class="stat-number">¥0.00</div>
                <p class="stat-label">总收入</p>
            </div>
        </div>
        
        <div class="admin-card">
            <div class="admin-card-header">
                <h2 class="admin-card-title">管理中心概览</h2>
            </div>
            <div class="admin-card-body">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i> 欢迎使用管理中心，您可以在这里管理商品、订单、客户等信息。
                </div>
                
                <h3><i class="fas fa-cogs"></i> 快速操作</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;">
                    <a href="products.asp" class="admin-btn admin-btn-primary admin-btn-lg" style="text-align: center; justify-content: center;">
                        <i class="fas fa-box-open"></i> 商品管理
                    </a>
                    <a href="orders.asp" class="admin-btn admin-btn-primary admin-btn-lg" style="text-align: center; justify-content: center;">
                        <i class="fas fa-shopping-cart"></i> 订单管理
                    </a>
                    <a href="note_inventory.asp" class="admin-btn admin-btn-primary admin-btn-lg" style="text-align: center; justify-content: center;">
                        <i class="fas fa-boxes"></i> 库存管理
                    </a>
                    <a href="production_management.asp" class="admin-btn admin-btn-primary admin-btn-lg" style="text-align: center; justify-content: center;">
                        <i class="fas fa-industry"></i> 生产管理
                    </a>
                    <a href="statistics_dashboard.asp" class="admin-btn admin-btn-primary admin-btn-lg" style="text-align: center; justify-content: center;">
                        <i class="fas fa-chart-line"></i> 数据统计
                    </a>
                    <a href="V6_USER_MANUAL.asp" class="admin-btn admin-btn-secondary admin-btn-lg" style="text-align: center; justify-content: center;">
                        <i class="fas fa-book"></i> 使用手册
                    </a>
                </div>
            </div>
        </div>
        
        <div class="admin-card">
            <div class="admin-card-header">
                <h2 class="admin-card-title">系统信息</h2>
            </div>
            <div class="admin-card-body">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                    <div>
                        <h4><i class="fas fa-server"></i> 服务器信息</h4>
                        <p>平台: Microsoft-IIS/...</p>
                        <p>脚本引擎: VBScript</p>
                        <p>数据库: Access/MSSQL</p>
                    </div>
                    <div>
                        <h4><i class="fas fa-shield-alt"></i> 安全提示</h4>
                        <p>• 请定期备份数据</p>
                        <p>• 使用强密码保护账户</p>
                        <p>• 定期更新系统</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
